<!DOCTYPE html>
<html>
<head>
    <title>SmartCast Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        video { width: 80%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    </style>
</head>
<body>
    <video id="video" controls></video>
    <script>
        var video = document.getElementById('video');
        // هنا حط الرابط اللي لقيته في ملف all_mbc_found.txt
        var videoSrc = 'رابط_القناة_هنا.m3u8'; 

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
