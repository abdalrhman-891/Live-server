<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهد برو | V4 الذكي</title>
    <style>
        body { background-color: #0b0b0b; color: #e5e5e5; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 50px; }
        .remote-container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #d4af37; display: inline-block; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        h1 { color: #d4af37; margin-bottom: 25px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { 
            background: #222; color: #d4af37; border: 1px solid #d4af37; 
            padding: 15px 25px; cursor: pointer; border-radius: 12px; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: #d4af37; color: #000; transform: translateY(-3px); }
        .note { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="remote-container">
    <h1>SHAHID PRO MAX 📺</h1>
    <div class="btn-grid">
        <button class="btn" onclick="launch('on')">ON TV</button>
        <button class="btn" onclick="launch('mbc_masr')">MBC مصر 1</button>
        <button class="btn" onclick="launch('mbc_masr2')">MBC مصر 2</button>
        <button class="btn" onclick="launch('mbc2')">MBC 2</button>
    </div>
    <p class="note">لو القناة مظهرتش، تأكد من سماح المتصفح بالـ Pop-ups</p>
</div>

<script>
    function launch(id) {
        // بنحدد رابط القناة بناءً على النوع
        let url = "";
        if(id === 'on') {
            url = "https://www.elahmad.com/tv/on-live-egypt.php";
        } else {
            // روابط MBC مصر 2 وكل الـ MBC بتشتغل 100% من هنا
            url = `https://www.elahmad.com/tv/radiant.php?id=${id}`;
        }

        // السر هنا: بنفتح نافذة جديدة "Popup"
        // دي بتخلي المتصفح يفك التشفير (DRM) كأنك فاتح الموقع الأصلي
        const win = window.open(url, 'ShahidPlayer', 'width=1000,height=600,scrollbars=no,resizable=yes');
        
        if (!win || win.closed || typeof win.closed == 'undefined') { 
            alert('يا عبد الله، المتصفح حاجب الـ Pop-ups! وافق عليها عشان القناة تفتح.');
        }
    }
</script>

</body>
</html>
