<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>SHAHID PRO MAX | FIXED</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; padding: 20px; max-width: 900px; margin: auto; }
        .card { background: #111; border: 2px solid #333; padding: 30px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 18px; }
        .card:hover { border-color: #d4af37; transform: scale(1.05); background: #1a1a1a; }
        .status { margin-top: 30px; color: #888; }
    </style>
</head>
<body>
    <h1>شاهد برو ماكس 📺</h1>
    <p>اضغط على القناة وسيتم فتح البث المباشر فوراً</p>
    
    <div class="grid">
        <div class="card" onclick="openLive('mbc1')">MBC 1</div>
        <div class="card" onclick="openLive('masr')">MBC مصر</div>
        <div class="card" onclick="openLive('mbc2')">MBC 2</div>
        <div class="card" onclick="openLive('drama')">MBC دراما</div>
    </div>

    <p id="msg" class="status">جاهز للبث المباشر...</p>

    <script>
        const API = "https://brief-subtle-technology--hanaamaryamsale.replit.app";

        async function openLive(id) {
            const msg = document.getElementById('msg');
            msg.innerText = "🔄 جاري جلب البث المباشر...";
            
            try {
                const r = await fetch(`${API}/get-channel/${id}`);
                const d = await r.json();
                
                if (d.link) {
                    msg.innerText = "✅ تم الاتصال!";
                    // السر هنا: فتح نافذة "مشغل" مستقلة تماماً لتجنب حظر جيت هاب
                    window.open(d.link, 'ShahidPlayer', 'width=1000,height=700,status=no,toolbar=no,menubar=no');
                }
            } catch (e) {
                msg.innerText = "❌ السيرفر لا يستجيب. تأكد من تشغيل Replit.";
            }
        }
    </script>
</body>
</html>
