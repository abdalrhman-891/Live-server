<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SHAHID PRO | النسخة المستقرة</title>
    <style>
        :root { --bg: #050505; --accent: #d4af37; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; border-bottom: 2px solid var(--accent); padding: 10px; text-align: center; }
        .main-layout { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }
        .sidebar { width: 180px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; overflow-y: auto; }
        .chan-btn { background: #111; color: var(--accent); border: 1px solid #222; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .chan-btn:hover, .chan-btn.active { background: var(--accent); color: #000; }
        .player-area { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .screen-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 15px; border: 2px solid #1a1a1a; overflow: hidden; }
        /* الـ iframe لازم يملى المكان */
        #main-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .status { font-size: 12px; color: #888; padding: 5px; border-right: 3px solid var(--accent); }
    </style>
</head>
<body>
    <header><h2>SHAHID PRO</h2></header>
    <div class="main-layout">
        <div class="sidebar">
            <button id="default-btn" class="chan-btn" onclick="play('mbc1', 'MBC 1', this)">MBC 1</button>
            <button class="chan-btn" onclick="play('masr', 'MBC مصر', this)">MBC مصر</button>
            <button class="chan-btn" onclick="play('mbc2', 'MBC 2', this)">MBC 2</button>
            <button class="chan-btn" onclick="play('action', 'MBC Action', this)">MBC Action</button>
            <button class="chan-btn" onclick="play('drama', 'MBC Drama', this)">MBC Drama</button>
        </div>
        <div class="player-area">
            <div class="screen-box">
                <iframe 
                    id="main-frame" 
                    src="about:blank" 
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
                    sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"
                    allowfullscreen>
                </iframe>
            </div>
            <div id="status" class="status">جاهز للمشاهدة...</div>
        </div>
    </div>

    <script>
        // تأكد إن ده رابط السيرفر بتاعك في Replit
        const API_BASE = "https://brief-subtle-technology--hanaamaryamsale.replit.app";

        async function play(id, name, btn) {
            const frame = document.getElementById('main-frame');
            const status = document.getElementById('status');
            
            document.querySelectorAll('.chan-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            status.innerText = `🔄 جاري طلب رابط ${name}...`;
            
            try {
                const res = await fetch(`${API_BASE}/get-channel/${id}`);
                const data = await res.json();
                if (data.link) {
                    // تفريغ الـ src أولاً يحل مشاكل الـ Cache
                    frame.src = "about:blank"; 
                    setTimeout(() => {
                        frame.src = data.link;
                        status.innerText = `✅ تشغيل ${name}`;
                    }, 100);
                }
            } catch (e) {
                status.innerText = `❌ فشل الاتصال بالسيرفر. تأكد من تشغيل Replit.`;
            }
        }
        // تشغيل أول قناة تلقائياً عند الفتح
        window.onload = () => document.getElementById('default-btn').click();
    </script>
</body>
</html>
