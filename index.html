<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SHAHID PRO | V3</title>
    <style>
        body { background: #000; color: #d4af37; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .card { background: #111; border: 2px solid #333; padding: 25px; border-radius: 20px; width: 320px; margin: auto; box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        .btn { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; margin: 10px 0; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.02); }
        .info { font-size: 11px; color: #666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SHAHID PRO MAX 📺</h2>
        <p>اضغط للتشغيل بدون حظر</p>
        <button class="btn" onclick="playSafe('mbc1')">MBC 1</button>
        <button class="btn" onclick="playSafe('mbc_masr')">MBC مصر 1</button>
        <button class="btn" onclick="playSafe('mbc_masr2')">MBC مصر 2</button>
        <button class="btn" onclick="playSafe('mbc2')">MBC 2</button>
        <div class="info">ملحوظة: لو ظهر إعلان اقفله وارجع للمشغل</div>
    </div>

    <script>
        function playSafe(id) {
            // الرابط اللي بيفتح المشغل
            const streamUrl = `https://www.elahmad.com/tv/radiant.php?id=${id}`;
            
            // بنفتح النافذة
            const win = window.open('', '_blank', 'width=1000,height=650');
            
            // بنحقن كود بيخلي المتصفح يطلب الصفحة وكأنها جاية من الأحمد
            const content = `
                <html>
                <head>
                    <title>Loading...</title>
                    <style>body{margin:0;background:#000;overflow:hidden;}</style>
                </head>
                <body>
                    <iframe src="${streamUrl}" 
                            width="100%" height="100%" 
                            frameborder="0" 
                            allow="autoplay; encrypted-media; fullscreen" 
                            allowfullscreen>
                    </iframe>
                </body>
                </html>
            `;
            win.document.write(content);
            win.document.close();
        }
    </script>
</body>
</html>
