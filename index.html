<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SHAHID PRO MAX</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; text-align: center; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #111; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .btn { background: #222; color: #d4af37; border: 1px solid #d4af37; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn:hover, .btn.active { background: #d4af37; color: #000; }
        .main { flex: 1; padding: 20px; }
        iframe { width: 100%; height: 80%; border: 2px solid #d4af37; border-radius: 15px; background: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button class="btn" onclick="load('mbc1', this)">MBC 1</button>
            <button class="btn" onclick="load('mbc2', this)">MBC 2</button>
            <button class="btn" onclick="load('masr', this)">MBC مصر</button>
            <button class="btn" onclick="load('action', this)">MBC Action</button>
        </div>
        <div class="main">
            <h2>SHAHID PRO | البث المباشر</h2>
            <iframe id="player" src="about:blank" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
            <p id="msg">اختر قناة للبدء...</p>
        </div>
    </div>
    <script>
        const API = "https://brief-subtle-technology--hanaamaryamsale.replit.app";
        async function load(id, btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('msg').innerText = "🔄 جاري جلب البث المباشر...";
            try {
                const r = await fetch(`${API}/get-channel/${id}`);
                const d = await r.json();
                // لو السيرفر جاب رابط m3u8 هنشغله فوراً
                document.getElementById('player').src = d.link;
                document.getElementById('msg').innerText = "✅ متصل الآن";
            } catch (e) {
                document.getElementById('msg').innerText = "❌ السيرفر لا يستجيب";
            }
        }
    </script>
</body>
</html>
