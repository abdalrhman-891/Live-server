<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SHAHID PRO MAX | النسخة المستقرة</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #111; border: 2px solid #222; padding: 25px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .card:hover { border-color: #d4af37; transform: scale(1.05); background: #1a1a1a; }
        .info { color: #888; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>SHAHID PRO MAX 📺</h1>
    <p>اضغط على القناة وسيفتح البث فوراً في نافذة آمنة</p>
    
    <div class="grid">
        <div class="card" onclick="watch('mbc1')">MBC 1</div>
        <div class="card" onclick="watch('mbc_masr')">MBC مصر</div>
        <div class="card" onclick="watch('mbc2')">MBC 2</div>
        <div class="card" onclick="watch('mbc_drama')">MBC دراما</div>
        <div class="card" onclick="watch('mbc_action')">MBC أكشن</div>
        <div class="card" onclick="watch('ontv1')">ON TV</div>
    </div>

    <p class="info">ملاحظة: تأكد من استخدام متصفح Chrome أو Edge لضمان عمل البث.</p>

    <script>
        function watch(id) {
    // الرابط ده هو المشغل المباشر اللي الأحمد بيسمح بيه
    const directUrl = `https://www.elahmad.com/tv/radiant.php?id=${id}`;
    
    // الحركة دي بتفتح القناة في صفحة جديدة (Tab) عشان نتخطى حماية الـ Iframe
    window.open(directUrl, '_blank');
}
    </script>
</body>
</html>
