<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>SHAHID PRO | الريموت السحري</title>
    <style>
        body { background: #000; color: #d4af37; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .btn { background: #111; color: #d4af37; border: 2px solid #d4af37; padding: 20px 40px; 
               cursor: pointer; border-radius: 15px; font-weight: bold; font-size: 20px; transition: 0.3s; }
        .btn:hover { background: #d4af37; color: #000; transform: scale(1.1); }
    </style>
</head>
<body>
    <h1>الريموت السحري 📺</h1>
    <p>لو طلع لك File not found، دوس على الزرار وهيفتح لك البث "بره" الحظر</p>
    
    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
        <button class="btn" onclick="go('mbc1')">MBC 1</button>
        <button class="btn" onclick="go('mbc_masr')">MBC مصر</button>
        <button class="btn" onclick="go('mbc2')">MBC 2</button>
    </div>

    <script>
        function go(id) {
            // هنا اللعبة: بنفتح الرابط في صفحة جديدة تماماً بعيد عن ريبلت وفيرسيل
            const url = `https://www.elahmad.com/tv/radiant.php?id=${id}`;
            
            // "window.open" بتخلي المتصفح يفتح الرابط كأنك كاتبه بإيدك في شريط العنوان
            // وده اللي كان بيشغلها معاك في الـ Live Server
            window.open(url, '_blank', 'width=1000,height=600');
        }
    </script>
</body>
</html>
