<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAHID PRO | النسخة المستقرة</title>
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #111;
            --accent: #d4af37;
            --text: #fff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #000;
            border-bottom: 2px solid var(--accent);
            padding: 10px;
            text-align: center;
        }

        .main-layout {
            display: flex;
            flex: 1;
            padding: 15px;
            gap: 15px;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
            overflow-y: auto;
            padding-left: 5px;
        }

        .chan-btn {
            background: var(--sidebar-bg);
            color: var(--accent);
            border: 1px solid #222;
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .chan-btn:hover {
            border-color: var(--accent);
            background: #1a1a1a;
        }

        .chan-btn.active {
            background: var(--accent);
            color: #000;
        }

        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .screen-box {
            position: relative;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            background: #000;
            border-radius: 15px;
            border: 2px solid #1a1a1a;
            overflow: hidden;
        }

        .screen-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .status {
            font-size: 11px;
            color: #666;
            padding: 8px;
            border-right: 3px solid var(--accent);
            background: #0a0a0a;
        }

        @media (max-width: 800px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; height: 80px; overflow-x: auto; }
            .screen-box { padding-bottom: 56.25%; }
        }
    </style>
</head>
<body>

    <header>
        <h2>SHAHID PRO EMBED</h2>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <button id="default-btn" class="chan-btn" onclick="smartSwitch('on', 'https://www.elahmad.com/tv/radiant.php?id=ontv1', 'ON TV', this)">ON TV 🔴</button>
            <button class="chan-btn" onclick="smartSwitch('masr', 'https://www.elahmad.com/tv/live/mbc_masr.php', 'MBC مصر 1', this)">MBC مصر 1</button>
            <button class="chan-btn" onclick="smartSwitch('masr2', 'https://www.elahmad.com/tv/live/mbc_masr2.php', 'MBC مصر 2', this)">MBC مصر 2</button>
            <button class="chan-btn active" onclick="smartSwitch('mbc1', 'https://www.elahmad.com/tv/live/mbc1.php', 'MBC 1', this)">MBC 1</button>
            <button class="chan-btn" onclick="smartSwitch('mbc2', 'https://www.elahmad.com/tv/live/mbc2.php', 'MBC 2', this)">MBC 2</button>
            <button class="chan-btn" onclick="smartSwitch('Qraan', 'https://www.elahmad.com/tv/watchtv.php?id=qoran_tv', 'السعودية مكة', this)">السعودية مكة</button>
            <button class="chan-btn" onclick="smartSwitch('drama', 'https://www.elahmad.com/tv/live/mbc_drama.php', 'MBC Drama', this)">MBC Drama</button>
        </div>

        <div class="player-area">
            <div class="screen-box">
                <iframe id="main-frame" 
                        src="about:blank" 
                        frameborder="0" 
                        allow="autoplay; encrypted-media; fullscreen; picture-in-picture" 
                        allowfullscreen 
                        scrolling="no">
                </iframe>
            </div>
            <div id="status" class="status">جاهز للبث المباشر...</div>
        </div>
    </div>

    <script>
        // تحديث الرابط للرابط الجديد اللي شغال حالياً
        const API_BASE = "https://brief-subtle-technology--hanaamaryamsale.replit.app";

        async function smartSwitch(endpoint, fallback, name, btn) {
            const frame = document.getElementById('main-frame');
            const status = document.getElementById('status');
            
            document.querySelectorAll('.chan-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // محاولة التشغيل بالرابط المباشر أولاً
            frame.src = fallback; 
            status.innerText = `جاري الاتصال بـ ${name}...`;

            try {
                const res = await fetch(`${API_BASE}/get-channel/${endpoint}`);
                const data = await res.json();
                
                if (data.link) {
                    frame.src = data.link;
                    status.innerText = `متصل بـ ${name} (سيرفر مفعل) ✅`;
                }
            } catch (e) {
                status.innerText = `متصل بـ ${name} (بث مباشر) 📡`;
            }
        }

        window.onload = () => document.getElementById('default-btn').click();
    </script>
</body>
</html>
