<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>SHAHID PRO | النسخة النهائية</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; text-align: center; }
        .sidebar { padding: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn { background: #111; color: #d4af37; border: 1px solid #d4af37; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .player-container { width: 90%; max-width: 900px; margin: 20px auto; aspect-ratio: 16/9; border: 2px solid #222; border-radius: 10px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h1>SHAHID PRO 📺</h1>
    <div class="sidebar">
        <button class="btn" onclick="load('mbc1')">MBC 1</button>
        <button class="btn" onclick="load('masr')">MBC مصر</button>
        <button class="btn" onclick="load('mbc2')">MBC 2</button>
    </div>

    <div class="player-container">
        <iframe id="player" src="about:blank" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        const API = "https://brief-subtle-technology--hanaamaryamsale.replit.app";

        async function load(id) {
            const frame = document.getElementById('player');
            try {
                const r = await fetch(`${API}/get-channel/${id}`);
                const d = await r.json();
                if (d.link) {
                    // بنعمل ريفريش كامل للـ iframe عشان يمسح كلمة File not found
                    frame.src = d.link;
                }
            } catch (e) {
                alert("السيرفر واقف، اتأكد إن ريبلت شغال.");
            }
        }
    </script>
</body>
</html>
