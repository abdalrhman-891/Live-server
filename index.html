<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAHID PRO | التحديث التلقائي</title>
    <style>
        :root { --bg: #050505; --accent: #d4af37; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; border-bottom: 2px solid var(--accent); padding: 10px; text-align: center; }
        .main-layout { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }
        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; overflow-y: auto; }
        .chan-btn { background: #111; color: var(--accent); border: 1px solid #222; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; font-size: 13px; text-align: right; }
        .chan-btn:hover { border-color: var(--accent); background: #1a1a1a; }
        .chan-btn.active { background: var(--accent); color: #000; }
        .player-area { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .screen-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 15px; border: 2px solid #1a1a1a; overflow: hidden; }
        .screen-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .status { font-size: 12px; color: #888; padding: 10px; border-right: 3px solid var(--accent); background: #0a0a0a; }
        @media (max-width: 800px) { .main-layout { flex-direction: column; } .sidebar { width: 100%; flex-direction: row; height: 70px; } }
    </style>
</head>
<body>

    <header><h2>SHAHID PRO LIVE</h2></header>

    <div class="main-layout">
        <div class="sidebar">
            <button id="default-btn" class="chan-btn" onclick="autoUpdate('mbc1', 'MBC 1', this)">MBC 1 📺</button>
            <button class="chan-btn" onclick="autoUpdate('mbc2', 'MBC 2', this)">MBC 2 🎬</button>
            <button class="chan-btn" onclick="autoUpdate('masr', 'MBC مصر 1', this)">MBC مصر 1</button>
            <button class="chan-btn" onclick="autoUpdate('masr2', 'MBC مصر 2', this)">MBC مصر 2</button>
            <button class="chan-btn" onclick="autoUpdate('action', 'MBC Action', this)">MBC Action</button>
            <button class="chan-btn" onclick="autoUpdate('on', 'ON TV', this)">ON TV 🔴</button>
        </div>

        <div class="player-area">
            <div class="screen-box">
                <iframe id="main-frame" src="about:blank" frameborder="0" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen scrolling="no"></iframe>
            </div>
            <div id="status" class="status">اختر قناة لبدء البث المباشر...</div>
        </div>
    </div>

    <script>
        // رابط سيرفر البايثون الخاص بك الشغال حالياً
        const API_BASE = "https://brief-subtle-technology--hanaamaryamsale.replit.app";

        async function autoUpdate(channelId, name, btn) {
            const frame = document.getElementById('main-frame');
            const status = document.getElementById('status');
            
            // تحديث واجهة الأزرار
            document.querySelectorAll('.chan-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            status.innerText = `🔄 السيرفر يبحث عن أفضل رابط لـ ${name}...`;
            frame.src = "about:blank"; // تنظيف الشاشة قبل العرض الجديد

            try {
                // نطلب الرابط الجديد من السيرفر
                const response = await fetch(`${API_BASE}/get-channel/${channelId}`);
                const data = await response.json();
                
                if (data.link) {
                    frame.src = data.link;
                    status.innerText = `✅ تم تحديث رابط ${name} تلقائياً بنجاح.`;
                } else {
                    status.innerText = `❌ عذراً، لم نجد رابطاً شغالاً لـ ${name} حالياً.`;
                }
            } catch (error) {
                console.error("Error fetching link:", error);
                status.innerText = `⚠️ فشل الاتصال بالسيرفر. تأكد من تشغيل Replit.`;
            }
        }

        // تشغيل أول قناة تلقائياً عند فتح الصفحة
        window.onload = () => document.getElementById('default-btn').click();
    </script>
</body>
</html>
