<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SHAHID PRO MAX</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; }
        .card { background: #111; border: 2px solid #d4af37; padding: 30px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 150px; }
        .card:hover { background: #d4af37; color: #000; }
        .notice { color: #555; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>شاهد برو (نسخة جيت هاب)</h1>
    <div class="grid">
        <div class="card" onclick="forcePlay('mbc1')">MBC 1</div>
        <div class="card" onclick="forcePlay('mbc_masr')">MBC مصر</div>
        <div class="card" onclick="forcePlay('mbc2')">MBC 2</div>
    </div>
    <p class="notice">إذا لم يفتح البث، تأكد من السماح بالنوافذ المنبثقة (Pop-ups) في المتصفح.</p>

    <script>
        function forcePlay(id) {
            // الرابط ده هو اللي اشتغل معاك في الفيجوال ستوديو
            const url = `https://www.elahmad.com/tv/radiant.php?id=${id}`;
            
            // بدلاً من iframe، هنفتح نافذة "بث" مستقلة لتخطي حماية جيت هاب
            const win = window.open('', '_blank', 'width=900,height=600');
            win.document.write(`
                <html>
                <body style="margin:0;background:#000;">
                    <iframe src="${url}" style="width:100%;height:100%;border:none;" allowfullscreen allow="autoplay; encrypted-media;"></iframe>
                </body>
                </html>
            `);
        }
    </script>
</body>
</html>
