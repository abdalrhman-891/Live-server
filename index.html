<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهد برو | البث المباشر الذكي</title>
    <style>
        body { background-color: #0b0b0b; color: #e5e5e5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { background: linear-gradient(145deg, #1a1a1a, #000); border-bottom: 2px solid #d4af37; padding: 20px; text-align: center; }
        header h1 { color: #d4af37; margin: 0; font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .main-container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        
        /* قائمة القنوات (الريموت) */
        .nav-channels { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { 
            background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; 
            padding: 12px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s;
        }
        .btn.active { background: #d4af37; color: #000; box-shadow: 0 0 10px #d4af37; }

        .player-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background-color: #000; border: 3px solid #d4af37; border-radius: 12px; }
        .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .content-info { background: #1a1a1a; margin-top: 20px; padding: 25px; border-radius: 12px; border-right: 5px solid #d4af37; }
        .content-info h2 { color: #d4af37; margin-top: 0; }
        .badge { background: #d4af37; color: #000; padding: 5px 12px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .status-bar { font-size: 11px; color: #666; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

<header><h1>شاهد برو - SHAHID PRO</h1></header>

<div class="main-container">
    <div class="nav-channels">
        <button class="btn active" onclick="smartSwitch('get-on', 'https://www.elahmad.com/tv/on-live-egypt.php', 'ON TV', this)">ON TV</button>
        <button class="btn" onclick="smartSwitch('get-masr', 'https://www.elahmad.com/tv/live/shahid_shaka.php?id=mbc_masr', 'MBC مصر 1', this)">MBC مصر 1</button>
        <button class="btn" onclick="smartSwitch('get-masr2', 'https://www.elahmad.com/tv/live/shahid_shaka.php?id=mbc_masr2', 'MBC مصر 2', this)">MBC مصر 2</button>
    </div>

    <div class="player-wrapper">
        <iframe id="main-player" src="about:blank" frameborder="0" scrolling="no" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin"></iframe>
    </div>
    
    <div id="sync-msg" class="status-bar">جاري فحص حالة الرابط...</div>

    <div class="content-info">
        <span class="badge">يعرض الآن</span>
        <h2 id="chan-title">قناة ON TV</h2>
        <p>متابعة حصرية لأحدث البرامج والمسلسلات بجودة عالية. النظام يراقب الروابط تلقائياً لضمان عدم الانقطاع.</p>
    </div>
</div>

<script>
    // ضع رابط مشروعك في ريبلت هنا
    const apiBase = "https://briefsubtletechnology-hanaamaryamsale.replit.dev"; 

    async function smartSwitch(endpoint, manualLink, title, btn) {
        // 1. تحديث شكل الأزرار والعنوان
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('chan-title').innerText = "قناة " + title;

        const player = document.getElementById('main-player');
        const msg = document.getElementById('sync-msg');

        // 2. تشغيل الرابط اليدوي فوراً (لضمان السرعة)
        player.src = manualLink;
        msg.innerText = "جاري التأكد من أن الرابط اليدوي هو الأحدث من المصدر...";

        // 3. الطلب من الـ API التأكد من الرابط الجديد
        try {
            const response = await fetch(`${apiBase}/${endpoint}`);
            const data = await response.json();
            
            if (data.link && data.link !== manualLink) {
                // إذا وجد الـ API رابطاً مختلفاً (تغير في الأحمد)، قم بتحديث المشغل
                player.src = data.link;
                msg.innerText = "تم تحديث الرابط تلقائياً من المصدر ✅";
            } else {
                msg.innerText = "الرابط اليدوي سليم ومطابق للمصدر ✅";
            }
        } catch (e) {
            msg.innerText = "تعذر الاتصال بالمراقب الذكي، يعمل بالوضع اليدوي حالياً ⚠️";
        }
    }

    // تشغيل أول قناة عند الفتح
    window.onload = () => {
        const firstBtn = document.querySelector('.btn');
        smartSwitch('get-on', 'https://www.elahmad.com/tv/on-live-egypt.php', 'ON TV', firstBtn);
    };
</script>

</body>
</html>
