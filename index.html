<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SHAHID PRO MAX</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .btn { background: #111; color: #d4af37; border: 2px solid #d4af37; padding: 20px 40px; cursor: pointer; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 10px; }
        .btn:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>
    <h1>شاهد برو ماكس 📺</h1>
    <p>اضغط على القناة لفتح البث المباشر في صفحة جديدة</p>
    
    <button class="btn" onclick="openLive('mbc1')">MBC 1</button>
    <button class="btn" onclick="openLive('masr')">MBC مصر</button>
    <button class="btn" onclick="openLive('mbc2')">MBC 2</button>
    
    <p id="msg"></p>

    <script>
        const API = "https://brief-subtle-technology--hanaamaryamsale.replit.app";

        async function openLive(id) {
            const msg = document.getElementById('msg');
            msg.innerText = "🔄 جاري جلب الرابط...";
            try {
                const res = await fetch(`${API}/get-channel/${id}`);
                const data = await res.json();
                if (data.link) {
                    msg.innerText = "✅ جاري الفتح...";
                    // هيفتح القناة في صفحة جديدة وكأنك داخل من موقع الأحمد
                    window.open(data.link, '_blank');
                }
            } catch (e) {
                msg.innerText = "❌ السيرفر مش شغال. اتأكد إنك دوست Run في Replit.";
            }
        }
    </script>
</body>
</html>
