<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>SHAHID PRO MAX | النسخة المستقرة</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #111; border: 2px solid #222; padding: 25px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .card:hover { border-color: #d4af37; transform: scale(1.05); background: #1a1a1a; }
        #status { color: #888; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>SHAHID PRO MAX 📺</h1>
    <p>إذا ظهرت شاشة سوداء، اضغط على القناة لفتحها في نافذة آمنة</p>
    
    <div class="grid">
        <div class="card" onclick="forcePlay('mbc1')">MBC 1</div>
        <div class="card" onclick="forcePlay('masr')">MBC مصر</div>
        <div class="card" onclick="forcePlay('mbc2')">MBC 2</div>
        <div class="card" onclick="forcePlay('drama')">MBC دراما</div>
    </div>

    <p id="status">جاهز للبث...</p>

    <script>
        const API = "https://brief-subtle-technology--hanaamaryamsale.replit.app";

        async function forcePlay(id) {
            const status = document.getElementById('status');
            status.innerText = "🔄 جاري تخطي حماية GitHub...";
            
            try {
                const r = await fetch(`${API}/get-channel/${id}`);
                const d = await r.json();
                
                if (d.link) {
                    // السر هنا: بنفتح نافذة "مشغل" مستقلة
                    // دي الطريقة اللي المتصفح بيعتبرها "أمان" زي الـ Live Server
                    window.open(d.link, 'ShahidPlayer', 'width=1000,height=700,status=no,toolbar=no,menubar=no');
                    status.innerText = "✅ تم فتح القناة في نافذة مستقلة";
                }
            } catch (e) {
                status.innerText = "❌ السيرفر لا يستجيب، تأكد من تشغيل Replit.";
            }
        }
    </script>
</body>
</html>
